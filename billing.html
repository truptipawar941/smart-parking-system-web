<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing System</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:250px;
height:100vh;
background:#111827;
position:fixed;
left:0;
top:0;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
text-align:center;
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
background:#1e293b;
border-radius:8px;
margin-top:8px;
}

.sidebar a:hover{
background:#38bdf8;
}

/* MAIN */
.main{
margin-left:270px;
padding:30px;
width:100%;
}

/* BOX */
.container{
max-width:900px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:15px;
}

h1{
text-align:center;
color:#38bdf8;
margin-bottom:20px;
}

/* INPUT */
.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0ea5e9;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0284c7;
}

/* RESULT */
.result{
margin-top:20px;
padding:15px;
background:#14532d;
border-radius:10px;
display:none;
line-height:1.6;
}

.card{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.box{
background:#0f172a;
padding:15px;
border-radius:10px;
text-align:center;
}

.box h3{
color:#94a3b8;
font-size:14px;
}

.box p{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🚗 Smart Parking</h2>

<a href="dashboard.html">📊 Dashboard</a>
<a href="entry.html">🚘 Vehicle Entry</a>
<a href="exit.html">🚪 Vehicle Exit</a>
<a href="billing.html">💰 Billing</a>
<a href="alerts.html">🚨 Alerts</a>
<a href="reports.html">📈 Reports</a>

<hr>

<a href="index.html">🔐 Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="container">

<h1>💰 Billing System</h1>

<div class="input-group">
<label>Vehicle Number</label>
<input type="text" id="vehicle">
</div>

<div class="input-group">
<label>Parking Hours</label>
<input type="number" id="hours">
</div>

<div class="input-group">
<label>Rate per Hour (₹)</label>
<input type="number" id="rate" value="30">
</div>

<button onclick="generateBill()">Generate Bill</button>

<div class="result" id="result"></div>

<!-- SUMMARY CARDS -->
<div class="card">

<div class="box">
<h3>Total Hours</h3>
<p id="tHours">0</p>
</div>

<div class="box">
<h3>Rate</h3>
<p id="tRate">₹0</p>
</div>

<div class="box">
<h3>Total Amount</h3>
<p id="tAmount">₹0</p>
</div>

</div>

</div>

</div>

<script>

function generateBill(){

let vehicle = document.getElementById("vehicle").value;
let hours = parseFloat(document.getElementById("hours").value);
let rate = parseFloat(document.getElementById("rate").value);

if(!vehicle || isNaN(hours) || isNaN(rate)){
alert("Fill all fields");
return;
}

let total = hours * rate;

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=`
<h3>✅ Bill Generated</h3>
Vehicle: <b>${vehicle}</b><br>
Hours: <b>${hours}</b><br>
Rate: <b>₹${rate}</b><br>
Total Amount: <b>₹${total}</b><br><br>
💳 Payment Status: <b style="color:#22c55e;">SUCCESS</b>
`;

/* update cards */
document.getElementById("tHours").innerText = hours;
document.getElementById("tRate").innerText = "₹" + rate;
document.getElementById("tAmount").innerText = "₹" + total;

}

</script>

</body>
</html>
