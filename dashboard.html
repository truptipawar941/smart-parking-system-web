<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Smart Parking</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:#111827;
  padding:20px;
}

.sidebar h2{
  color:#38bdf8;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:8px 0;
  background:#1e293b;
  border-radius:8px;
}

.sidebar a:hover{
  background:#38bdf8;
}

/* MAIN CONTENT */
.content{
  margin-left:270px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚗 Smart Parking</h2>

  <a href="dashboard.html">📊 Dashboard</a>
  <a href="entry.html">🚘 Vehicle Entry</a>
  <a href="exit.html">🚪 Vehicle Exit</a>
  <a href="billing.html">💰 Billing</a>
  <a href="alerts.html">🚨 Alerts</a>
  <a href="reports.html">📈 Reports</a>

  <hr style="margin:15px 0;">

  <a href="index.html">🔐 Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

  <h1>📊 Dashboard</h1>

  <div class="card">
    <h3>Total Slots</h3>
    <p>4</p>
  </div>

  <div class="card">
    <h3>Available Slots</h3>
    <p id="available">Loading...</p>
  </div>

  <div class="card">
    <h3>Occupied Slots</h3>
    <p id="occupied">Loading...</p>
  </div>

</div>

<!-- FIREBASE CONNECTION -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } 
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyC-MpKMFGvH3FHJyF1n1SGT-WJsUBKd_RY",
    authDomain: "smartparking-1803.firebaseapp.com",
    databaseURL: "https://smartparking-1803-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "smartparking-1803",
    storageBucket: "smartparking-1803.firebasestorage.app",
    messagingSenderId: "642103736914",
    appId: "1:642103736914:web:2c2307880c90ab30c2bd8b"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const totalSlots = 4;

  // LIVE LISTENER
  const vehiclesRef = ref(db, "vehicles");

  onValue(vehiclesRef, (snapshot) => {
    const data = snapshot.val();

    let count = 0;

    if (data) {
      count = Object.keys(data).length;
    }

    let occupied = count;
    let available = totalSlots - occupied;

    if (available < 0) available = 0;

    document.getElementById("occupied").innerText = occupied;
    document.getElementById("available").innerText = available;
  });

</script>

</body>
</html>
